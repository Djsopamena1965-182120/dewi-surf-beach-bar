<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dewi Surf & Beach Bar</title>
  <link rel="stylesheet" href="style.css">
  <script src="translations.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>Dewi Surf & Beach Bar</h1>
    <p id="bannerSubtitle"></p>
    <a id="bannerBtn" href="#menu"></a>
  </header>

  <nav>
    <div class="nav-links">
      <a id="navMenu" href="#menu"></a>
      <a id="navEvents" href="#events"></a>
      <a id="navGallery" href="#gallery"></a>
      <a id="navPrices" href="#prices"></a>
      <a id="navContact" href="#contact"></a>
    </div>
    <div class="nav-lang">
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="id">Bahasa</option>
        <option value="nl" selected>Nederlands</option>
      </select>
    </div>
  </nav>

  <section id="menu" class="menu">
    <h2 id="menuTitle"></h2>
    <img src="images/tropische-drankjes.png" alt="Tropische cocktails">
    <img src="images/bintang.png" alt="Bintang bier">
    <p id="menuDesc"></p>
    <a href="#contact" id="reserveBtn" class="btn"></a>
  </section>

  <section id="events" class="events">
    <h2 id="eventsTitle"></h2>
    <img src="images/strandfeest-met-gitaar-en-vuur.png" alt="Strandfeest">
    <p id="eventsDesc"></p>
  </section>

  <section id="beachparty" class="event">
    <h2 id="beachPartyTitle"></h2>
    <p id="beachPartyTime"></p>
    <p id="beachPartyDetails"></p>
    <p id="beachPartyPrice"></p>
    <div id="countdown">
      <h3 id="countdownTitle"></h3>
      <div id="countdownTimer"></div>
      <a href="https://wa.me/6285261099023" id="countdownBtn" target="_blank"></a>
    </div>
  </section>

  <section id="gallery" class="gallery">
    <h2 id="galleryTitle"></h2>
    <img src="images/dewi-surf-beach-bar.png" alt="Beach Bar">
    <img src="images/surfsectie.png" alt="Surfer">
  </section>

  <section id="prices" class="prices">
    <h2 id="pricesTitle"></h2>
    <table>
      <tr><th>Lesoptie</th><th>Prijs</th></tr>
      <tr><td id="pricePrivate"></td><td>200,000 IDR / uur</td></tr>
      <tr><td id="priceSemi"></td><td>150,000 IDR / uur</td></tr>
      <tr><td id="priceGroup"></td><td>100,000 IDR / uur</td></tr>
    </table>
  </section>

  <section id="contact">
    <h2 id="contactTitle"></h2>
    <p id="contactDesc"></p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." 
      width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
  </section>

  <div id="groupQR">
    <h3 id="groupQRTitle"></h3>
    <p id="groupQRNote"></p>
    <img src="images/QR-code.png" alt="QR code">
    <p><a href="https://chat.whatsapp.com/IE5dzNGeFNCKl0VAFOmWGX" target="_blank">Klik hier om deel te nemen</a></p>
  </div>

  <footer>
    <p id="footerText"></p>
  </footer>
</body>
</html>
